- note: fast/sets
  fast: true
  modules:
  - |
    package sets
    
    a := 1
    b := 1
    c := 2
    d := 3
    
    e := "one"
    f := "one"
    g := "two"
    h := "three" {
      d > c
      c > b
      b >= a
    }
    
    i := {"foo": 1}
    j := {"foo": 1}
    k := {"foo": 2, "bar": 1, "baz": 1}
    l := {"foo": 3, "bar": 2, "baz": 1}
    
    int_set := {4, a, c, d, b}
    string_set := {"four", g, f, e}
    obj_set := {i, j, k, l}
    array_set := {[a, b], [b, a], [a, c], [a, d], [b, c], [b, d], [c, d]}
    
    empty_set := set()
  query: data.sets.string_set = x
  want_result:
    - x:
        - four
        - one
        - two
- note: fast/sets_membership
  fast: true
  modules:
  - |
    package sets
       
    i := {"foo": 1}
    j := {"foo": 1}
    k := {"foo": 2, "bar": 1, "baz": 1}
    l := {"foo": 3, "bar": 2, "baz": 1}
    
    obj_set := {i, j, k, l}
    
    empty_set := set()
    
    m {
      data.sets.obj_set[{"foo": 1}]
    }
  query: data.sets.m = x
  want_result:
    - x: true
- note: fast/multi/0
  fast: true
  input:
    a: 10
  modules:
  - |
    package multi

    default a := 0

    a := val {
        input.a > 0
        input.a < 10
        input.a % 2 == 1
        val := input.a * 10
    } {
        input.a > 0
        input.a < 10
        input.a % 2 == 0
        val := input.a * 10 + 1
    }
    
    a := input.a / 10 {
        input.a >= 10
    }
  query: data.multi.a = x
  want_result:
    - x: 1
