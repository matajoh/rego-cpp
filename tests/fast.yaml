- note: fast/compare
  fast: true
  modules:
  - |
    package compare

    a := {"one": 1, "two": 2}
    b := {"two": 2, "three": 3}
    c := "2"
    d := "0001"
    e := [0, 1, 2]
    f := [0, 0, 0, 4]
    g := {"b": "2", "a": "1"}
    h := {"b": "1", "a": "2"}

    output := [a < b, c < d, e < f, g < h]
  query: data.compare.output = x
  want_result:
    - x: [true, false, false, true]
- note: fast/setops
  fast: true
  modules:
  - |
    package setops

    a := {1, 2, 3, 4}
    b := {3, 4, 5}
    c := {4, 5, 6}
    d := {2, 3, 4}
    e := a | b & c | d
    f := {x | some x in b & c | d}
    g := [a | b]
    h := [a | b, 4]
    i := { a: b | c }
    j := { a: b, c: d | e}
    k := a - d

    output {
      e == {1, 2, 3, 4, 5}
        f == {2, 3, 4, 5}
        g == [a]
        h == [{1, 2, 3, 4, 5}, 4]
        i == {
          a: {3, 4, 5}
        }
        j == {
          a: {3, 4, 5},
            c: {1, 2, 3, 4, 5}
        }
        k == {1}
        1 in a | b
        3 in a & b | c & d
    }
  query: data.setops.output = x
  want_result:
    - x: true
- note: fast/time
  fast: true
  modules:
  - |
    package time

    now_ns := time.now_ns()

    is_same if {
      test := now_ns
      test.sleep("1ms")
      test == time.now_ns()
    }
  query: x:=data.time.is_same
  want_result:
    - x: true
