cases:
- modules:
  - |1
       
      
     package scalars
     
     greeting := "Hello"
     max_height := 42
     pi := 3.14159
     allowed := true
     location := null
  note       : fast/scalars
  fast       : true
  query      : x:=data.scalars.greeting
  want_result:
    - x: Hello
- data:
    one:
      bar: Foo
      baz: 5
      be : true
      bop: 23.4
    two:
      bar: Bar
      baz: 12.3
      be : false
      bop: 42
    three:
      bar: Baz
      baz: 15
      be : true
      bop: 4.23
  input:
    a: 10
    b: "20"
    c: 30.0
    d: true
  modules:
  - |
    package objects
    
    rect := {`width`: 2, "height": 4}
    cube := {"width": 3, `height`: 4, "depth": 5}
    a := 42
    b := false
    c := null
    d := {"a": a, "x": [b, c]}
    index := 1
    shapes := [rect, cube]
    names := ["prod", `smoke1`, "dev"]
    sites := [{"name": "prod"}, {"name": names[index]}, {"name": "dev"}]
    e := {
        "42": "foo",
        "three": c,
        "dev": b,
        "four": d,
    }
    f := e[names[2]]
  note : fast/input_data
  fast : true
  query: "x := [data.one,
    input.b, 
    data.objects.sites[1]]"
  want_result:
    - x:
      - bar: Foo
        baz: 5
        be: true
        bop: 23.4
      - "20"
      - name: smoke1
- modules:
  - |
