    a := 42
    b := false
    c := null
    d := {"a": a, "x": [b, c]}
    index := 1
    shapes := [rect, cube]
    names := ["prod", `smoke1`, "dev"]
    sites := [{"name": "prod"}, {"name": names[index]}, {"name": "dev"}]
    e := {
        a: "foo",
        "three": c,
        names[2]: b,
        "four": d,
    }
    f := e["dev"]
  note : fast/objects
  fast : true
  query: data.objects.sites[1].name = x
  want_result:
    - x: smoke1
- note: fast/query_math
  fast: true
  query: 'x=5;
    y=x + (2 - 4 * 0.25) * -3 + 7.4'
  sort_bindings: true
  want_result:
    - x: 5
      y: 9.4
- note: fast/expressions
  fast: true
  modules:
  - |
    package expressions
    
    a := 5
    b := -2
    c := a + b
    d := c * -2.5
    e := (a + b) == 7
    f := (c + d) != 7
    g := 3 > -1
    h := 2.5 >= a
    i := b < a
    j := 1.0 <= 2.1
    k := a - (b + -c) * (-d / 2) + 3.7
  query: data.expressions.k > 27 = x
  want_result:
    - x: true
- note: fast/bodies
  fast: true
  modules:
  - |
    package bodies
    
    val := -1
    a := 5
    b := 3
    c := a + b { a; b; a > b }
    d := val {
      input.a < a
      val := a + data.bodies.b
    } {
      input.a >= data.bodies.a
      val := a - b
    }
    
    e := {"one": x, "two": y + z} {
      x := a * b
      c
      y := d
      z := x - y
    }
    
    default f := false
    
    f {
      b < a
      not d
    }
    
    f {
      input.c > d
    }
    
    g {
      d == a + b
      a < b
    }
  input:
    a: 10
    b: "20"
    c: 30.0
    d: true
  query: data.bodies.e = x
  want_result:
    - x:
        one: 15
        two: 15
